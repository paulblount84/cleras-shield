<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cleras Shield</title>
  </head>
  <body>
    <div id="root"></div>
<script>
  function showError(msg) {
    document.body.innerHTML =
      '<pre style="white-space:pre-wrap;color:#f66;background:#111;padding:16px;font-family:monospace;font-size:13px;">' +
      msg.replace(/</g, '&lt;') +
      '</pre>';
  }
  window.addEventListener('error', function (e) {
    showError((e.error && e.error.stack) || e.message);
  });
  window.addEventListener('unhandledrejection', function (e) {
    showError((e.reason && e.reason.stack) || String(e.reason));
  });
</script>
   
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
